<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#0B1927"/>
  <!-- Network nodes -->
  <circle cx="24" cy="10" r="3.5" fill="#2FB7C9"/>
  <circle cx="10" cy="34" r="3.5" fill="#2FB7C9"/>
  <circle cx="38" cy="34" r="3.5" fill="#2FB7C9"/>
  <!-- Connecting spokes -->
  <line x1="24" y1="10" x2="10" y2="34" stroke="#2FB7C9" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="24" y1="10" x2="38" y2="34" stroke="#2FB7C9" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="10" y1="34" x2="38" y2="34" stroke="#2FB7C9" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Centre hub -->
  <circle cx="24" cy="26" r="4" fill="#2FB7C9" fill-opacity="0.25" stroke="#2FB7C9" stroke-width="1.5"/>
  <circle cx="24" cy="26" r="2" fill="#2FB7C9"/>
  <!-- Hub spokes to nodes -->
  <line x1="24" y1="26" x2="24" y2="13.5" stroke="#2FB7C9" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="24" y1="26" x2="13.5" y2="32" stroke="#2FB7C9" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="24" y1="26" x2="34.5" y2="32" stroke="#2FB7C9" stroke-width="1.2" stroke-opacity="0.5"/>
</svg>
